<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account Recovery</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-page" data-corruption="3">
    <!-- the login form is not security. it is a confession box with labels. -->
    <main class="login-shell" aria-labelledby="loginTitle">
      <section class="login-card">
        <p class="eyebrow">Sunny Room Games / account recovery</p>
        <h1 id="loginTitle">Member Login</h1>
        <p id="loginMemory">this account was never yours</p>

        <form id="gatewayForm">
          <label for="usernameInput">username</label>
          <input id="usernameInput" name="username" autocomplete="nickname" placeholder="guest" />

          <label for="codeInput">password / access code</label>
          <input id="codeInput" name="code" autocomplete="off" placeholder="SUNNY" />

          <label class="check-row">
            <input id="rememberInput" type="checkbox" />
            <span>remember me</span>
          </label>

          <div class="login-actions">
            <button type="submit">login</button>
            <button type="button" id="guestLogin">login as guest</button>
          </div>
        </form>

        <button class="forgot-link" id="forgotPassword">forgot password?</button>
        <p class="login-response" id="gatewayResponse" aria-live="polite"></p>

        <section class="access-list" aria-labelledby="accessTitle">
          <h2 id="accessTitle">access levels</h2>
          <div id="accessLevels"></div>
        </section>

        <p class="login-foot">
          <a class="protected-link" href="index.html">Back</a>
        </p>
      </section>
    </main>

    <script src="fragments.js"></script>
    <script src="routes.js"></script>
    <script>
      const routes = window.RAGE_ROUTES || {};
      const routeList = Object.values(routes);
      const found = new Set(JSON.parse(localStorage.getItem("rage_fragments_found") || localStorage.getItem("sunnyRoom.fragments.v2") || "[]"));
      const unlocked = new Set(JSON.parse(localStorage.getItem("rage_unlocked_codes") || "[]"));
      const attemptsKey = "rage_login_attempts";
      const response = document.querySelector("#gatewayResponse");
      const username = document.querySelector("#usernameInput");
      const codeInput = document.querySelector("#codeInput");
      const accessLevels = document.querySelector("#accessLevels");
      const savedName = localStorage.getItem("rage_user_name");
      const returnCount = Number(localStorage.getItem("rage_return_count") || "0") + 1;

      localStorage.setItem("rage_return_count", String(returnCount));
      if (savedName) {
        username.value = savedName;
        document.querySelector("#loginMemory").textContent = `${savedName}, you came back.`;
      } else if (returnCount > 1) {
        document.querySelector("#loginMemory").textContent = "you came back.";
      }

      function saveUnlocked() {
        localStorage.setItem("rage_unlocked_codes", JSON.stringify([...unlocked]));
      }

      function renderAccess() {
        accessLevels.innerHTML = routeList.map((route) => {
          const open = unlocked.has(route.label) || route.minFragments === 0;
          const href = open ? route.href : "#";
          const status = open ? "open" : `${route.minFragments} fragments`;
          return `<a class="${open ? "open" : "locked"}" href="${href}" data-code="${route.label}"><span>${route.label}</span><em>${status}</em></a>`;
        }).join("");
      }

      function matchRoute(raw) {
        const typed = raw.trim().toUpperCase().replace(/\s+/g, "");
        return routeList.find((route) => route.label === typed || (route.aliases || []).map((alias) => alias.replace(/\s+/g, "")).includes(typed));
      }

      function fail(raw) {
        const attempts = Number(localStorage.getItem(attemptsKey) || "0") + 1;
        localStorage.setItem(attemptsKey, String(attempts));
        const name = localStorage.getItem("rage_user_name");
        if (name && raw.trim().toLowerCase() === name.toLowerCase()) {
          response.textContent = "that name opens nothing yet.";
          return;
        }
        response.textContent = [
          "invalid password.",
          "try the word you use when you are lying.",
          "you typed wrong, but the feeling matched.",
          "access denied: not deep enough.",
          "the login form is tired of pretending this is security."
        ][Math.min(attempts - 1, 4)];
      }

      document.querySelector("#gatewayForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const name = username.value.trim();
        const rawCode = codeInput.value;
        if (name) localStorage.setItem("rage_user_name", name);
        const route = matchRoute(rawCode);
        if (!route) {
          fail(rawCode);
          return;
        }
        if (route.label === "VOID" && found.size < route.minFragments) {
          response.textContent = "you cannot enter the void from the surface.";
          return;
        }
        if (found.size < route.minFragments) {
          response.textContent = `access denied: ${route.minFragments - found.size} more fragments still under the skin.`;
          return;
        }
        unlocked.add(route.label);
        saveUnlocked();
        renderAccess();
        response.textContent = route.message;
        window.setTimeout(() => {
          window.location.href = route.href;
        }, 900);
      });

      document.querySelector("#guestLogin").addEventListener("click", () => {
        response.textContent = "guest mode cannot enter the room.";
      });

      document.querySelector("#forgotPassword").addEventListener("click", () => {
        response.textContent = "hint: codes are not passwords. they are words the site could not digest.";
      });

      renderAccess();
    </script>
  </body>
</html>
