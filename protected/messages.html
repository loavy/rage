<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Messages - Sunny Room Games</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/horror.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html"><span class="brand-mark">SR</span><span>Messages</span></a>
    <nav class="nav-links" aria-label="main"><a href="../login.html">login</a><a href="../index.html">home</a></nav>
  </header>
  <main class="page-shell">
    <section class="page-card">
      <h1>Message Hero Inbox</h1>
      <p class="small">The phone looks normal because phones are excellent masks.</p>
      <div class="chat-shell">
        <aside class="contact-list" aria-label="contacts">
          <button data-contact="mom">Mom</button>
          <button data-contact="friend" data-fragment-id="f08">Friend</button>
          <button data-contact="unknown">Unknown</button>
          <button data-contact="support" data-fragment-id="f12">Sunny Room Games Support</button>
          <button data-contact="room">The Room</button>
          <button data-contact="yourself">Yourself</button>
        </aside>
        <section class="message-pane" aria-live="polite">
          <div data-messages></div>
          <p class="typing" data-typing>Mom is typing...</p>
          <div class="reply-row">
            <button data-reply="im fine">im fine</button>
            <button data-reply="lol">lol</button>
            <button data-reply="later">later</button>
            <button data-reply="sorry">sorry</button>
            <button data-reply="i dont know">i dont know</button>
            <button data-reply="please notice">please notice</button>
          </div>
        </section>
      </div>
    </section>
  </main>
  <div class="fragment-counter" data-fragment-counter>0 / 30 fragments</div>
  <script src="../js/storage.js"></script>
  <script src="../js/fragments.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const threads = {
      mom: ["did you eat?", "are you sleeping?", "you said you were fine.", "why did your message sound copied?", "I keep reading it again and it keeps not sounding like you"],
      friend: ["bro you good?", "you disappeared yesterday", "nvm you probably busy", "haha same", "wait", "why did I believe you?", "you made okay sound so easy"],
      unknown: ["do not answer too fast", "the mask types before the boy does", "some replies are sealed rooms with emojis", "the first honest reply will feel late"],
      support: ["thank you for contacting support", "we cannot restore deleted childhoods", "please describe the bug without becoming it"],
      room: ["you left words under the bed", "I kept them", "do you want them back?", "I can return them slowly"],
      yourself: ["do not send this", "do not send this", "please notice", "please notice before I become easy to miss"]
    };
    const pane = document.querySelector("[data-messages]");
    const typing = document.querySelector("[data-typing]");
    let active = "mom";
    function render() {
      pane.innerHTML = threads[active].map((text) => `<p class="bubble them">${text}</p>`).join("");
      typing.textContent = `${active} is typing...`;
    }
    document.querySelectorAll("[data-contact]").forEach((button) => button.addEventListener("click", () => {
      active = button.dataset.contact;
      render();
    }));
    document.querySelectorAll("[data-reply]").forEach((button) => button.addEventListener("click", () => {
      const count = RageStore.countFragments();
      let reply = button.dataset.reply;
      if (count < 10 && reply !== "im fine") reply = "im fine";
      if (reply === "im fine") RageStore.flag(RageStore.keys.saidFine);
      if (reply === "please notice") {
        RageFragments.recover("f23");
        pane.insertAdjacentHTML("beforeend", `<p class="bubble system">message not sent. but the room heard it.</p>`);
        RageStore.unlockCode("STILLHERE");
      }
      pane.insertAdjacentHTML("beforeend", `<p class="bubble me">${reply}</p>`);
      if (reply === "im fine") {
        pane.insertAdjacentHTML("beforeend", `<p class="bubble system">autofill learned this one before you did.</p>`);
      }
    }));
    render();
  </script>
</body>
</html>
