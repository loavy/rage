<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Message Hero Archive</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="subsite messages-site" data-corruption="2">
    <main class="subsite-shell">
      <header class="subsite-header">
        <p class="eyebrow">Message Hero Archive</p>
        <h1>inbox recovered</h1>
        <p id="messageMemory">the mask types before the boy does</p>
      </header>

      <section class="phone-shell" aria-label="Recovered messages">
        <div class="thread-list">
          <button data-thread="mom">Mom</button>
          <button data-thread="friend">Friend</button>
          <button data-thread="unknown">Unknown</button>
          <button data-thread="support">Sunny Support</button>
          <button data-thread="room">The Room</button>
          <button data-thread="self">Yourself</button>
        </div>
        <div class="message-window" id="messageWindow" aria-live="polite"></div>
        <div class="reply-row">
          <button data-reply="im fine">im fine</button>
          <button data-reply="lol">lol</button>
          <button data-reply="later">later</button>
          <button data-reply="sorry">sorry</button>
          <button data-reply="i dont know">i dont know</button>
          <button data-reply="please notice" id="noticeReply">please notice</button>
        </div>
      </section>

      <p><a class="protected-link" href="../login.html">Back</a></p>
    </main>

    <script>
      const name = localStorage.getItem("rage_user_name");
      const found = new Set(JSON.parse(localStorage.getItem("rage_fragments_found") || localStorage.getItem("sunnyRoom.fragments.v2") || "[]"));
      const unlocked = new Set(JSON.parse(localStorage.getItem("rage_unlocked_codes") || "[]"));
      const threads = {
        mom: ["Did you eat?", "Are you sleeping?", "You said you were fine.", "Why did your message sound copied?"],
        friend: ["bro you good?", "you disappeared yesterday", "nvm you probably busy", "haha same", "wait", "why did I believe you?"],
        unknown: ["do not answer too fast", "the mask types before the boy does", "some replies are rooms with locks"],
        support: ["Ticket #000: user reports being normal.", "Resolution: marked as fixed by mistake.", "Escalation code: FINE."],
        room: ["I heard the message before you sent it.", "The walls do not need notifications.", "Code hint: ROOM."],
        self: ["delete this", "say lol", "say later", "say sorry", "say anything except please notice"]
      };
      const windowEl = document.querySelector("#messageWindow");
      const noticeReply = document.querySelector("#noticeReply");

      if (name) document.querySelector("#messageMemory").textContent = `${name}, do you also answer too fast?`;
      noticeReply.disabled = found.size < 10;

      function render(thread) {
        windowEl.innerHTML = threads[thread].map((line, index) => `<p class="${index % 2 ? "them" : "me"}">${line}</p>`).join("");
      }

      document.querySelectorAll("[data-thread]").forEach((button) => {
        button.addEventListener("click", () => render(button.dataset.thread));
      });

      document.querySelectorAll("[data-reply]").forEach((button) => {
        button.addEventListener("click", () => {
          const reply = button.dataset.reply;
          if (reply === "please notice" && found.size >= 10) {
            unlocked.add("MOUTH");
            localStorage.setItem("rage_unlocked_codes", JSON.stringify([...unlocked]));
            windowEl.insertAdjacentHTML("beforeend", `<p class="me">please notice</p><p class="them">I am here. I am not asking you to explain yet.</p>`);
            return;
          }
          localStorage.setItem("rage_said_fine", "true");
          windowEl.insertAdjacentHTML("beforeend", `<p class="me">im fine</p>`);
        });
      });

      render("friend");
    </script>
  </body>
</html>
